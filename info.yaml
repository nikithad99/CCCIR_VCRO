# Tiny Tapeout project information
project:
  title:        "Analog Test Circuit ITS: VCO"      # Project title
  author:       "Nikitha"      # Your name
  discord:      "Nikitha"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Voltage controlled ring oscillator. "      # One line description of what your project does
  language:     "Analog" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1 (digital only), 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_nurirfansyah_alits01"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "project.v"
 


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui_in[0]: ""
  ui_in[1]: ""
  ui_in[2]: ""
  ui_in[3]: ""
  ui_in[4]: ""
  ui_in[5]: ""
  ui_in[6]: ""
  ui_in[7]: ""

  # Outputs
  uo_out[0]: "out5"
  uo_out[1]: "out4"
  uo_out[2]: "out3"
  uo_out[3]: "out2"
  uo_out[4]: "out1"
  uo_out[5]: "out0"
  uo_out[6]: ""
  uo_out[7]: ""

  # Bidirectional pins
  uio_in[0]: ""
  uio_in[1]: ""
  uio_in[2]: ""
  uio_in[3]: ""
  uio_in[4]: ""
  uio_in[5]: ""
  uio_in[6]: ""
  uio_in[7]: ""

  # Analog pins - you can add more if you use them, up to 6.
  # Keep only the "ua" pins you are actually using, and *delete* any unused "ua" pins.
  # The first pins is always ua[0], and the pin numbers must be sequential.
  ua[0]: "out"
  ua[1]: "vcon_n"
  ua[2]: "vcon_p"
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
